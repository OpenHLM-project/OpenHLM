[project]
name = "htc-interface"
version = "0.1.0"
description = "HTC tracker interface scripts for Windows"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.4.2",
    "openvr>=2.12.1401; sys_platform == 'win32'",
    "pyzmq>=27.1.0",
    "rich>=14.1.0",
    "scipy>=1.17.1",
    "tyro>=0.9.31",
    "win-precise-time>=1.4.2; sys_platform == 'win32'",
]

[project.scripts]
send-pose = "htc_scripts.send_pose:cli"
record-pose = "htc_scripts.record_pose:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/htc", "src/htc_scripts"]
